schema_version: 1

context:
  python_min: "3.10"
  version: "1.2.1"

package:
  name: trame-colormaps
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/trame-colormaps/trame_colormaps-${{ version }}.tar.gz
  sha256: 9a77725c815dc8c4c97731a13cef8b298cf924644934e57226fcf90e53b79cbc

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - trame >=3
    - trame-dataclass >=2
    - trame-vuetify >=3.2
    - vtk-base

tests:
  - python:
      imports:
        - trame_colormaps
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Self-contained colormap module for VTK color transfer functions in Trame apps
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/Kitware/trame-colormaps

extra:
  recipe-maintainers:
    - jourdain
